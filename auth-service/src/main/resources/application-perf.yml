# application-perf.yml — auth-service
# Profile override cho performance test trong Docker

spring:
  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://localhost:5432/rbac_auth}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  jpa:
    show-sql: false

management:
  tracing:
    sampling:
      probability: 0.1

tracing:
  success-rate: 0.01

logging:
  level:
    root: INFO
