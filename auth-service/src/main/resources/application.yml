server:
  port: 8081

spring:
  application:
    name: rbac-auth

  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://localhost:5432/rbac_auth}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: email

  # ==================== KAFKA (Producer) ====================
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: true

# ==================== EUREKA CLIENT ====================
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
    registry-fetch-interval-seconds: 15
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    health-check-url-path: /actuator/health

# ==================== JWT ====================
# NOTE: JwtService signs with RS256. The 'jwt.secret' is kept for backward compat only.
jwt:
  secret: bXlfc3VwZXJfc2VjcmV0X2tleV9mb3JfcmJhY19nYXRld2F5XzIwMjQ=
  expiration: 86400000   # 24h in ms

app:
  jwt:
    refresh-expiration-days: 7
  internal:
    secret: ${INTERNAL_SECRET:changeme-internal-secret}

# ==================== OIDC SERVER ====================
oidc:
  issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8081}
  rsa-key-path: ${OIDC_RSA_KEY_PATH:}

# ==================== MFA ====================
mfa:
  # Issuer name shown in authenticator apps (e.g. "RbacGateway" appears as "RbacGateway:user@mail.com")
  issuer: ${MFA_ISSUER:RbacGateway}

management:
  endpoints:
    web:
      exposure:
        include: health, mappings, metrics, prometheus
  endpoint:
    health:
      show-details: always

  tracing:
    sampling:
      probability: 1.0

  opentelemetry:
    resource-attributes:
      service.name: ${spring.application.name}

  otlp:
    metrics:
      export:
        enabled: false

tracing:
  success-rate: 1.0
  excluded-paths:
    - /actuator
    - /favicon.ico
    - /eureka
  export:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}

logging:
  level:
    root: INFO
    com.netflix.discovery: WARN
    com.netflix.eureka: WARN
