version: '3.9'

services:

  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:16-alpine
    container_name: rbac-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-12345}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rbac-network

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: rbac-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rbac-network

  # ==================== Redis Commander (UI) ====================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: rbac-redis-ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-}
    ports:
      - "8090:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - rbac-network

  # ==================== SonarQube ====================
  sonarqube:
    image: sonarqube:25.1.0.102122-community
    container_name: rbac-sonarqube
    restart: unless-stopped
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonarqube
      SONAR_JDBC_USERNAME: ${DB_USERNAME:-postgres}
      SONAR_JDBC_PASSWORD: ${DB_PASSWORD:-12345}
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      postgres:
        condition: service_healthy
    # SonarQube requires vm.max_map_count >= 524288
    # Run once on host: sudo sysctl -w vm.max_map_count=524288
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - rbac-network

  # ==================== Migration (Flyway) ====================
  migration:
    build:
      context: .
      dockerfile: migration/Dockerfile
    container_name: rbac-migration
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-12345}
      # application.yml của migration dùng DB_URL trực tiếp
      DB_URL: jdbc:postgresql://postgres:5432/postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      - rbac-network

  # ==================== Auth Service ====================
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: rbac-auth
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: perf
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-12345}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-bXlfc3VwZXJfc2VjcmV0X2tleV9mb3JfcmJhY19nYXRld2F5XzIwMjQ=}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-changeme-internal-secret}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      start_period: 45s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M
    networks:
      - rbac-network

  # ==================== Resource Service ====================
  resource-service:
    build:
      context: .
      dockerfile: resource-service/Dockerfile
    container_name: rbac-resource
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: perf
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-12345}
      AUTH_SERVICE_URL: http://auth-service:8081
      INTERNAL_SECRET: ${INTERNAL_SECRET:-changeme-internal-secret}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      auth-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      start_period: 45s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M
    networks:
      - rbac-network

  # ==================== API Gateway ====================
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: rbac-gateway
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: perf
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-12345}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-bXlfc3VwZXJfc2VjcmV0X2tleV9mb3JfcmJhY19nYXRld2F5XzIwMjQ=}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-changeme-internal-secret}
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_healthy
      resource-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 3072M
    networks:
      - rbac-network

  # ==================== whoami performance test ====================
  who-am-i:
    container_name: who-am-i
    image: traefik/whoami
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`whoami.localhost`)"
      - "traefik.http.routers.whoami.entrypoints=web"
    ports:
      - "81:80"
    networks:
      - rbac-network

volumes:
  postgres_data:
  redis_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:

networks:
  rbac-network:
    driver: bridge
