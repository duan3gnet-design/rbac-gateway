version: '3.9'

services:

  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:16-alpine
    container_name: rbac-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-12345}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rbac-network

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: rbac-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rbac-network

  # ==================== Redis Commander (UI) ====================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: rbac-redis-ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-}
    ports:
      - "8090:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - rbac-network

  # ==================== SonarQube ====================
  sonarqube:
    image: sonarqube:25.1.0.102122-community
    container_name: rbac-sonarqube
    restart: unless-stopped
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonarqube
      SONAR_JDBC_USERNAME: ${DB_USERNAME:-postgres}
      SONAR_JDBC_PASSWORD: ${DB_PASSWORD:-12345}
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      postgres:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - rbac-network

  # ==================== Eureka Server ====================
  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: rbac-eureka
    restart: unless-stopped
    environment:
      EUREKA_HOSTNAME: eureka-server
      # Tắt self-preservation trong Docker dev (bật lại ở production)
      EUREKA_SELF_PRESERVATION: "false"
      EUREKA_EVICTION_INTERVAL: "15000"
    ports:
      - "8761:8761"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - rbac-network

  # ==================== Migration (Flyway) ====================
  migration:
    build:
      context: .
      dockerfile: migration/Dockerfile
    container_name: rbac-migration
    environment:
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-12345}
      AUTH_DB_URL: jdbc:postgresql://postgres:5432/rbac_auth
      RESOURCE_DB_URL: jdbc:postgresql://postgres:5432/rbac_resource
      GATEWAY_DB_URL: jdbc:postgresql://postgres:5432/rbac_gateway
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      - rbac-network

  # ==================== Auth Service ====================
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: rbac-auth
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: perf
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-12345}
      AUTH_DB_URL: jdbc:postgresql://postgres:5432/rbac_auth
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-bXlfc3VwZXJfc2VjcmV0X2tleV9mb3JfcmJhY19nYXRld2F5XzIwMjQ=}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-changeme-internal-secret}
      # Eureka: trỏ vào container eureka-server trong cùng network
      EUREKA_URL: http://eureka-server:8761/eureka/
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      start_period: 45s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M
    networks:
      - rbac-network

  # ==================== Resource Service ====================
  resource-service:
    build:
      context: .
      dockerfile: resource-service/Dockerfile
    container_name: rbac-resource
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: perf
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-12345}
      RESOURCE_DB_URL: jdbc:postgresql://postgres:5432/rbac_resource
      AUTH_SERVICE_URL: http://auth-service:8081
      INTERNAL_SECRET: ${INTERNAL_SECRET:-changeme-internal-secret}
      # Eureka: trỏ vào container eureka-server trong cùng network
      EUREKA_URL: http://eureka-server:8761/eureka/
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      auth-service:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      start_period: 45s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M
    networks:
      - rbac-network

  # ==================== API Gateway ====================
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: rbac-gateway
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: perf
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-12345}
      GATEWAY_DB_URL: jdbc:postgresql://postgres:5432/rbac_gateway
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-bXlfc3VwZXJfc2VjcmV0X2tleV9mb3JfcmJhY19nYXRld2F5XzIwMjQ=}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-changeme-internal-secret}
      # Eureka: trỏ vào container eureka-server trong cùng network
      EUREKA_URL: http://eureka-server:8761/eureka/
      # Jaeger OTLP — dùng HTTP port 4318, Spring Boot gửi qua HTTP/Protobuf
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_healthy
      resource-service:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 3072M
    networks:
      - rbac-network

  # ==================== whoami performance test ====================
  who-am-i:
    container_name: who-am-i
    image: traefik/whoami
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`whoami.localhost`)"
      - "traefik.http.routers.whoami.entrypoints=web"
    ports:
      - "81:80"
    networks:
      - rbac-network

  # ==================== Jaeger (OTLP + UI) ====================
  jaeger:
    image: jaegertracing/jaeger:2.6.0
    container_name: rbac-jaeger
    restart: unless-stopped
    environment:
      # Jaeger v2 all-in-one nạp config từ đây
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver (nhận spans từ api-gateway)
      - "4318:4318"     # OTLP HTTP receiver
      - "14269:14269"
    networks:
      - rbac-network

  # ==================== Prometheus ====================
  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: rbac-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle   # POST /-/reload để reload config
      - --enable-feature=exemplar-storage
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api-gateway
    networks:
      - rbac-network

  # ==================== Grafana ====================
  grafana:
    image: grafana/grafana:11.6.1
    container_name: rbac-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Tích hợp Jaeger trace link từ Grafana Explore
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
      - jaeger
    networks:
      - rbac-network

volumes:
  postgres_data:
  redis_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  prometheus_data:
  grafana_data:

networks:
  rbac-network:
    driver: bridge
