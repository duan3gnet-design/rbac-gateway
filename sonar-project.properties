# =====================================================
# SonarQube — RBAC Gateway multi-module project
# =====================================================

sonar.projectKey=rbac-gateway
sonar.projectName=RBAC Gateway
sonar.projectVersion=1.0-SNAPSHOT

sonar.host.url=http://localhost:9000

# Source encoding
sonar.sourceEncoding=UTF-8
sonar.java.source=21

# Modules
sonar.modules=api-gateway,auth-service,resource-service

api-gateway.sonar.projectName=API Gateway
api-gateway.sonar.projectBaseDir=api-gateway
api-gateway.sonar.sources=src/main/java
api-gateway.sonar.tests=src/test/java
api-gateway.sonar.java.binaries=target/classes
api-gateway.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

auth-service.sonar.projectName=Auth Service
auth-service.sonar.projectBaseDir=auth-service
auth-service.sonar.sources=src/main/java
auth-service.sonar.tests=src/test/java
auth-service.sonar.java.binaries=target/classes
auth-service.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

resource-service.sonar.projectName=Resource Service
resource-service.sonar.projectBaseDir=resource-service
resource-service.sonar.sources=src/main/java
resource-service.sonar.tests=src/test/java
resource-service.sonar.java.binaries=target/classes
resource-service.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclusions — không scan boilerplate
sonar.exclusions=\
  **/generated/**,\
  **/*Application.java,\
  **/config/**,\
  **/entity/**,\
  **/dto/**,\
  **/exception/**,\
  **/migration/**

# Coverage exclusions — không tính coverage cho các file này
sonar.coverage.exclusions=\
  **/*Application.java,\
  **/config/**,\
  **/entity/**,\
  **/dto/**,\
  **/exception/**
