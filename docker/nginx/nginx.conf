events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Tự động chuyển hướng HTTP sang HTTPS
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # Cấu hình HTTPS Proxy
    server {
        listen 443 ssl;
        server_name localhost;

        # Đường dẫn tới file .crt và .key đã mount vào container
        ssl_certificate     /etc/nginx/certs/auth-service.crt;
        ssl_certificate_key /etc/nginx/certs/auth-service.key;

        # Cấu hình bảo mật SSL
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        location / {
            # Dùng đúng service name trong docker-compose (auth-service), không phải container name
            set $upstream http://auth-service:8081;
            proxy_pass $upstream;

            # Chuyển tiếp các header cần thiết
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout hợp lý
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }
    }
}
