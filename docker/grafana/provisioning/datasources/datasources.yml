apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: jaeger
          urlDisplayLabel: "View in Jaeger"

  - name: Jaeger
    type: jaeger
    uid: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: true
    jsonData:
      tracesToLogsV2:
        datasourceUid: ""
      nodeGraph:
        enabled: true
      spanBar:
        type: "Tag"
        tag: "http.url"

  # k6 metrics sink — chỉ active khi chạy profile perf
  # Grafana tự skip datasource nếu InfluxDB chưa sẵn sàng
  - name: InfluxDB-k6
    type: influxdb
    uid: influxdb-k6
    access: proxy
    url: http://influxdb:8086
    editable: true
    jsonData:
      dbName: k6
      httpMode: GET
