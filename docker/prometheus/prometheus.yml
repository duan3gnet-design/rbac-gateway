global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: rbac-gateway

scrape_configs:

  # ── Prometheus tự scrape chính nó ────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: [ localhost:9090 ]

  # ── API Gateway ───────────────────────────────────────────────────────────
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    scrape_interval: 5s
    static_configs:
      - targets: [ api-gateway:8080 ]
    relabel_configs:
      - source_labels: [ __address__ ]
        target_label: instance

  # ── Auth Service (optional — thêm khi auth-service có actuator/prometheus) ──
  # - job_name: auth-service
  #   metrics_path: /actuator/prometheus
  #   static_configs:
  #     - targets: [ auth-service:8081 ]

  # ── Resource Service (optional) ───────────────────────────────────────────
  # - job_name: resource-service
  #   metrics_path: /actuator/prometheus
  #   static_configs:
  #     - targets: [ resource-service:8082 ]

  # ── InfluxDB (k6 metrics — chỉ có khi chạy profile perf) ────────────────
  - job_name: influxdb
    metrics_path: /metrics
    scrape_interval: 5s
    static_configs:
      - targets: [ influxdb:8086 ]
