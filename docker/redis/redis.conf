maxmemory 256mb
maxmemory-policy allkeys-lru

# appendonly yes gây fsync liên tục → tắt khi perf test
# Bật lại (appendonly yes) khi cần durability ở production
appendonly no

# Tăng hz để Redis xử lý expiry/eviction nhanh hơn dưới tải cao
hz 20

# Tắt save snapshot khi perf test (tránh fork blocking)
save ""
