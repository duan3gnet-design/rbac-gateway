# application-perf.yml — resource-service
# Profile override cho performance test trong Docker

spring:
  datasource:
    url: ${RESOURCE_DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/rbac_resource}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false

app:
  auth-service:
    url: ${AUTH_SERVICE_URL:http://auth-service:8081}

management:
  tracing:
    sampling:
      probability: 0.1

tracing:
  success-rate: 0.01

logging:
  level:
    root: INFO
