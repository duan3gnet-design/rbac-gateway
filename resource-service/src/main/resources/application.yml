server:
  port: 8082

spring:
  application:
    name: resource-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: false   # Migration chạy từ module riêng

app:
  auth-service:
    url: ${AUTH_SERVICE_URL:http://localhost:8081}
  internal:
    secret: ${INTERNAL_SECRET:changeme-internal-secret}

management:
  endpoints:
    web:
      exposure:
        include: health, gateway, circuitbreakers, circuitbreakerevents, retryevents
  endpoint:
    health:
      show-details: always