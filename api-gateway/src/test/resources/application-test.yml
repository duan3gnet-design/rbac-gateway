spring:

  application:
    name: api-gateway-test

  main:
    allow-bean-definition-overriding: true
    web-application-type: servlet

  threads:
    virtual:
      enabled: true

  cloud:
    gateway:
      mvc:
        trusted-proxies: ".*"
    eureka:
      client:
        enabled: false
        register-with-eureka: false
        fetch-registry: false
    loadbalancer:
      cache:
        enabled: false

jwt:
  secret: bXlfc3VwZXJfc2VjcmV0X2tleV9mb3JfcmJhY19nYXRld2F5XzIwMjQ=

rate-limit:
  replenish-rate: 5
  burst-capacity: 5
  allow-on-redis-failure: true
  excluded-paths:
    - /api/auth/login
    - /api/auth/register
    - /api/auth/refresh
    - /api/auth/logout
    - /oauth2/**
    - /login/oauth2/**
    - /actuator/**
    - /fallback/**
    - /error

# ── Circuit Breaker — test profile ──────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      fastOpenCB:
        sliding-window-size: 4
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      slowOpenCB:
        sliding-window-size: 4
        failure-rate-threshold: 50
        wait-duration-in-open-state: 1s
        permitted-number-of-calls-in-half-open-state: 1
        automatic-transition-from-open-to-half-open-enabled: true

  timelimiter:
    instances:
      fastOpenCB:
        timeout-duration: 3s
      slowOpenCB:
        timeout-duration: 3s

management:
  endpoints:
    web:
      exposure:
        include: health, gateway, circuitbreakers
  endpoint:
    gateway:
      enabled: true
  health:
    circuitbreakers:
      enabled: true

logging:
  level:
    root: WARN
    com.api.gateway: DEBUG
    org.springframework.cloud.gateway: WARN
    io.github.resilience4j: DEBUG

