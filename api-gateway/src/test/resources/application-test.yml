spring:
  application:
    name: api-gateway-test
  main:
    web-application-type: reactive

  # R2DBC connection được auto-configured bởi @ServiceConnection trên PostgreSQLContainer bean
  # Không cần khai báo spring.r2dbc.url ở đây

  cloud:
    gateway:
      server:
        webflux:
          trusted-proxies: ".*"

jwt:
  secret: bXlfc3VwZXJfc2VjcmV0X2tleV9mb3JfcmJhY19nYXRld2F5XzIwMjQ=

# Rate limit thấp để integration test chạy nhanh
rate-limit:
  replenish-rate: 5
  burst-capacity: 5
  allow-on-redis-failure: true
  excluded-paths:
    - /api/auth/login
    - /api/auth/register
    - /api/auth/refresh
    - /api/auth/logout
    - /oauth2/**
    - /login/oauth2/**
    - /actuator/**

resilience4j:
  circuitbreaker:
    instances:
      authServiceCB:
        sliding-window-size: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 2s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
      resourceServiceCB:
        sliding-window-size: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 2s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true

  timelimiter:
    instances:
      authServiceCB:
        timeout-duration: 3s
      resourceServiceCB:
        timeout-duration: 3s

management:
  endpoints:
    web:
      exposure:
        include: health, gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    root: WARN
    com.api.gateway: DEBUG
    org.springframework.cloud.gateway: WARN
    io.github.resilience4j: DEBUG
