# application-perf.yml — api-gateway
# Profile override cho performance test trong Docker

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:12345}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 1800000
      connection-timeout: 3000

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      connect-timeout: 2s
      timeout: 3s
      lettuce:
        pool:
          enabled: true
          min-idle: 8
          max-idle: 16
          max-active: 32
          max-wait: 1s

logging:
  level:
    root: WARN
    org.springframework.cloud.gateway: WARN
    io.github.resilience4j: WARN
    com.api.gateway: WARN
    io.lettuce: WARN
