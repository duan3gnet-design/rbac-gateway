# application-perf.yml — api-gateway
# Profile override cho performance test và Docker deployment

spring:
  datasource:
    url: ${GATEWAY_DB_URL:jdbc:postgresql://postgres:5432/rbac_gateway}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:12345}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 1800000
      connection-timeout: 3000

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      connect-timeout: 2s
      timeout: 3s
      lettuce:
        pool:
          enabled: true
          min-idle: 8
          max-idle: 16
          max-active: 32
          max-wait: 1s

# ── Tracing ──────────────────────────────────────────────────────────────
tracing:
  success-rate: 0.05   # dev: 100%, production nên đặt 0.05 — 0.1

logging:
  level:
    root: WARN
    org.springframework.cloud.gateway: WARN
    io.github.resilience4j: WARN
    com.api.gateway: WARN
    io.lettuce: WARN
