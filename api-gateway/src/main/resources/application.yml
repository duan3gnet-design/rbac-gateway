server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: servlet   # MVC thay WebFlux

  # ==================== VIRTUAL THREAD ====================
  threads:
    virtual:
      enabled: true   # Bật Virtual Thread cho toàn bộ Tomcat worker threads

  # ==================== DATASOURCE (HikariCP) ====================
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 1800000   # 30 phút
      connection-timeout: 3000

  # ==================== REDIS ====================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      connect-timeout: 2s
      timeout: 3s
      lettuce:
        pool:
          min-idle: 4
          max-idle: 16
          max-active: 32

  # ==================== GATEWAY MVC ====================
  cloud:
    gateway:
      mvc:
        # Routes load động từ PostgreSQL qua DatabaseRouteLocator
        # (không dùng RouteDefinitionRepository vì đó là API WebFlux)
        trusted-proxies: ".*"

# ==================== JWT ====================
jwt:
  secret: bXlfc3VwZXJfc2VjcmV0X2tleV9mb3JfcmJhY19nYXRld2F5XzIwMjQ=

# ==================== RATE LIMIT ====================
rate-limit:
  replenish-rate: 200000
  burst-capacity: 400000
  allow-on-redis-failure: true
  excluded-paths:
    - /api/auth/login
    - /api/auth/register
    - /api/auth/refresh
    - /api/auth/logout
    - /api/auth/google
    - /oauth2/**
    - /login/oauth2/**
    - /actuator/**

# ==================== RESILIENCE4J ====================
resilience4j:
  circuitbreaker:
    instances:
      authServiceCB:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      resourceServiceCB:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

  timelimiter:
    instances:
      authServiceCB:
        timeout-duration: 3s
      resourceServiceCB:
        timeout-duration: 5s

# ==================== ACTUATOR ====================
management:
  endpoints:
    web:
      exposure:
        include: health, gateway, circuitbreakers, circuitbreakerevents, retryevents
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
  health:
    circuitbreakers:
      enabled: true

# ==================== LOGGING ====================
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    io.github.resilience4j: DEBUG
    com.api.gateway.route: DEBUG
