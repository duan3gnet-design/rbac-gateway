server:
  port: 8080

spring:
  application:
    name: api-gateway
    instance-id: ${spring.application.name}:${random.uuid}
  main:
    web-application-type: servlet   # MVC thay WebFlux

  # ==================== VIRTUAL THREAD ====================
  threads:
    virtual:
      enabled: true

  # ==================== DATASOURCE (HikariCP) ====================
  datasource:
    url: ${GATEWAY_DB_URL:jdbc:postgresql://localhost:5432/rbac_gateway}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 1800000
      connection-timeout: 3000

  # ==================== REDIS ====================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      connect-timeout: 2s
      timeout: 3s
      lettuce:
        pool:
          min-idle: 4
          max-idle: 16
          max-active: 32

  cloud:
    # ==================== GATEWAY MVC ====================
    gateway:
      mvc:
        trusted-proxies: ".*"

    # ==================== LOAD BALANCER ====================
    loadbalancer:
      # Dùng cache Caffeine để không gọi Eureka mỗi request
      cache:
        enabled: true
        # TTL của cache instances — sync với registry-fetch-interval-seconds
        ttl: 10s
        # Capacity ban đầu của cache (số service khác nhau)
        capacity: 256
      # Chiến lược: ROUND_ROBIN (default) hoặc RANDOM
      # RoundRobin phù hợp nhất cho Gateway routing đồng đều tải
      configurations: default
      # Health-check: chỉ route đến instance đang UP
      health-check:
        initial-delay: 0
        interval: 10s
        # Bật refetch khi tất cả instances của 1 service đều unreachable
        refetch-instances-interval: 25s

# ==================== EUREKA CLIENT ====================
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
    # Giảm từ 30s → 10s để detect instance mới / dead nhanh hơn
    registry-fetch-interval-seconds: 10
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    health-check-url-path: /actuator/health

# ==================== JWT ====================
jwt:
  secret: bXlfc3VwZXJfc2VjcmV0X2tleV9mb3JfcmJhY19nYXRld2F5XzIwMjQ=

# ==================== GATEWAY ROUTE REFRESH ====================
gateway:
  route-refresh:
    # Redis Pub/Sub channel dùng để broadcast cache invalidation sang tất cả nodes.
    # Override nếu cần tách channel theo môi trường (e.g. gateway:route-refresh:staging).
    channel: gateway:route-refresh

# ==================== RATE LIMIT ====================
rate-limit:
  replenish-rate: 200000
  burst-capacity: 400000
  allow-on-redis-failure: true
  excluded-paths:
    - /api/auth/login
    - /api/auth/register
    - /api/auth/refresh
    - /api/auth/logout
    - /api/auth/google
    - /oauth2/**
    - /login/oauth2/**
    - /actuator/**
    - /error

# ==================== RESILIENCE4J ====================
resilience4j:
  circuitbreaker:
    instances:
      authServiceCB:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      resourceServiceCB:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

  timelimiter:
    instances:
      authServiceCB:
        timeout-duration: 3s
      resourceServiceCB:
        timeout-duration: 5s

# ==================== ACTUATOR ====================
management:
  endpoints:
    web:
      exposure:
        include: health, gateway, circuitbreakers, circuitbreakerevents, retryevents, prometheus, metrics, info, mappings

  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
    prometheus:
      enabled: true

  health:
    circuitbreakers:
      enabled: true

  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms, 100ms, 200ms, 500ms, 1s

  # ==================== TRACING (Micrometer OTel → Jaeger) ====================
  tracing:
    sampling:
      probability: 1.0   # PHẢI là 1.0 — tail-based filtering xảy ra ở TailSamplingExporter
                         # Nếu đặt < 1.0 ở đây, spans bị drop trước khi đến exporter

  opentelemetry:
    resource-attributes:
      service.name: ${spring.application.name}

  otlp:
    metrics:
      export:
        enabled: false

tracing:
  success-rate: 1.0
  excluded-paths:
    - /actuator
    - /favicon.ico
    - /eureka
  export:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}

# ==================== LOGGING ====================
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: WARN
    org.springframework.cloud.loadbalancer: WARN
    io.github.resilience4j: WARN
    com.api.gateway.route: WARN
    com.netflix.discovery: WARN
    com.netflix.eureka: WARN
    io.opentelemetry: WARN
    io.micrometer.tracing: WARN #DEBUG
